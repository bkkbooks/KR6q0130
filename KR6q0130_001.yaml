body:
  text: 洞下衡南大義山沙門淨訥述世尊凡為說法或先舉喻次舉法或先舉法次舉喻謂之法喻相參以曉未悟此古今說法之恒規也雲巖寶鏡三昧建章二十六句廣舉大法為案恐人以文害義故引嬰兒喻作證所謂如世嬰兒五相完具不去不來不起不住婆婆和和有句無句下復舉重離一喻曰如離六爻偏正回互疊而為三變盡成五此謂以喻合喻使人了了無疑雲巖惟取重離一卦為喻此外竝無干涉故曰疊而為三變盡成五所云三疊五變是法數非卦數是藉卦之陰陽二爻以明偏正回互之義以疊三喻三德變五喻五位五本乎三三本乎一合上嬰兒喻雖有五相而具於一人恐人於此起三五異見乃重說二喻曰如荎草味如金剛杵草雖五味具於一枚杵雖三相具於一事前後四喻皆以總攝別以體攝用諄諄發明三德五位悉本乎一心故斷章取義專取重離為喻即事顯理以彰正偏妙叶之旨何得浪談易理認婉喻為正解乎或曰何謂三德曰法身般若解脫是也何謂五位曰正中偏偏中正正中來兼中至兼中到此洞山之建立也以至五位君臣五位功勳五位王子皆原此爾立名異而體同其所本者亦從大教住行向地等妙發來故舉五則攝盡一切差別無餘也或曰三德於重離如何分配曰初疊即重離初爻二爻二二疊即三爻四爻二三疊即五爻六爻二每一疊取陰陽兩爻為喻在卦乃乘承比應是世間之道在法乃體用回互是出世間之道故借喻以顯其法也如初疊卦義兩爻一陽一陰首得乾之初九為少陽而居陽位取乾元善長之本以喻初住之根本智無一法當情所謂正位也次得坤之六二為少陰而居陰位取敬以直內義以方外之德用喻初住之普賢行涉大功勳所謂偏位也智行互參直透過五十二位而回入妙有五位一貫故初成般若德也如二疊卦義兩爻純陽初得乾之九三為太陽而居陽位次得乾之九四為老陽而居陰位剛柔互徹理事合明故於法喻大智已滿大行已圓成等正覺故次成法身德也如三疊卦義兩爻一陰一陽首得坤之六五為太陰而居太陽之位次得乾之上九為老陽而居老陰之位其動而無動靜而無靜動靜恒如非離非即故於法喻五位佛果已畢隱勝現劣隨類化身非凡而凡非聖而聖生佛二習悉皆融化故末成解脫德也或曰五位於重離五變如何分配曰即以六爻從下至上而互成五變也每一變用上下二爻陰陽交徹以喻偏正回互之旨首以初爻之少陽比二爻之少陰為變陽剛而陰柔喻初位正中偏以明從體起用寂而常照也次即二爻之少陰比三爻之太陽陰極而陽生喻第二位偏中正以明攝用歸體照而常寂也次即三爻之太陽比四爻之老陽陽極而暗動喻第三位正中來以明體用圓明功位齊彰寂照一如也次即四爻之老陽比五爻之老陰為陽隱於陰陰升於陽隱顯自在觸背俱非喻第四位兼中至以明道後普賢行行彌法界機彼無遺非寂非照也次即五爻之老陰比六爻之老陽陰居陽位明用無窮陽居陰位大功不宰頭頭上顯事事無礙喻第五位兼中到以明聖凡一際生佛兩忘齊與法界而法界量滅寂照同泯也此雲巖所引重離一卦觀爻相有如此回互之妙乃拈來為喻初以六爻分三疊以象三德次以六爻分五變以象五位不動本卦而三五之體用回互位位本自天然有如伏羲神禹見河洛二圖陰陽法數遂援數以窮理堪為儒宗兼可通於釋宗作人天之眼目也若覺範之非理變卦非理配法其違戾儒佛之旨遺害於千古之後滔滔而莫之返可不痛乎辯謬諸條不錄莫大義以明則諸謬自消矣茲更錄諸師建立宗旨大意數條觀之則不墮邪謬矣第一雲巖如離六爻偏正回互者此單取爻相奇偶發明五位回互所謂錯然則吉不可犯忤觀錯然二字則知指奇偶為言若各居本位則滯在觸背乃犯忤之過也即此可知是取奇偶非取卦義明矣即如正偏五位亦是秉華嚴住行向地等妙為宗不然何不停四至六是知先德准此五位為式乃建立五位正偏詳而示之初位正中偏之正者乃的指大悟一真法界之空如來藏性為體是道前文殊之智舍事就理為宗也纔入正位不許坐著坐著則成滲漏故著一偏字以遣我執乃能從體起用也第二位偏中正之偏者與初位偏字稍別謂是從體起用五十二位大行多涉有為舍理就事轉功就位是大悟已後證不空如來藏性為用纔涉功勳不許坐著坐著則成滲漏故著一正字以遣法執方能圓滿佛果此一正字乃道後之後得智是以諸佛果地覺之正本初位諸佛因地心之正而為言也此兩位是圓教五十二位智行互融因果一如之般若德也如善財初見文殊末見普賢是智行圓滿佛果之位無二無別也第三正中來者此一正字是攝前因果一如之正為佛果已滿方堪垂法利生是初住八相成道已證法身德而現應化二身善赴羣機故曰正中來也第四兼中至者此明道後普賢行謂兼前三位之旨至者周也謂佛果之後乃純是利他之行一一周徧法界而無遺矣如華嚴現等法界身雲利等法界眾生故曰至也第五位兼中到者謂到此位兼前四位一齊泯踪絕跡生佛如如依正如如是一真法界並無三世十方迷悟聖凡之跡故曰到也到者墮也不然則三漏齊犯故以三墮齊收而成解解德也然此五位即一位故復引荎草而為喻也五位皆屬建立為方便接引故喻如嬰兒也三德本乎一心故喻如金剛杵也此略言雲巖建旨之妙如是第二洞山价祖根正偏復建五位功勳者蓋恐學人坐著正偏遂以乾慧為足則道果難臻故於各位下建立功勳以明五位進修淺深之旨其於正中偏下立向位者謂念念趨向根本不動智佛始得其正則知初位以趨向為功勳也於偏中正下立奉位者謂五十二位階級念念奉重佛果為宗始得佛果圓滿故以奉重為功勳也於正中來下立功位者謂乘前五十二位有修有證之功而至妙覺無修無證之果故獨以大功為功勳也於兼中至下立共功者謂道後普賢行乃攝化無餘必須感應道交方堪受化所謂賓主交光真俗一致故以共功為功勳也於兼中到下立功功位者謂前四位是有為無為之道通屬自利利他邊事而心佛眾生不能泯跡於此位乃得心佛眾生同歸實際是以智遣智渾合如如故曰功功也第三曹山寂祖又根功勳而立五位君臣者此明正偏五位尊卑主伴之德相也故於正中偏下立君視臣是喻從體起用之德相也於偏中正下立臣奉君是喻攝用歸體之德相也於正中來下立君位居中是喻因果一如理事互融之德相也於兼中至下立臣位是喻道後普賢大行純是利他為冥應羣生之德相也於兼中到下立君臣道合是喻凡聖同泯正符華嚴六相之壞相也第四石霜諸祖又根正偏功勳君臣之制而立五位王子者此單明五位權實二智之差別也五位皆以生為言者顯二智之發生也五位皆以王為言者顯尊卑自在之義也五位皆以子為言者顯智種嗣息之義也蓋物物有智常被五蘊八識所覆必值佛祖啟迪乃能開發從始至終權實不同故應五位次第建立始盡萬法源底於初位下立為誕生王子者謂即根本無明而成不動之智此智向者隱覆今乃初發是根本智故喻為誕生也於第二位下立為朝生者是從真際起大功勳破九界無明起十度大行已涉有為是差別智故喻為朝生也前位是夜半正明此位是天曉不露故名回互於第三位下立為末生者是功位已滿即補處位唯此最後一生即便八相成道是後得智故喻為末生也於第四位下立為化生者是道後普賢行乃冥應羣機之種智而變化莫測故直云化生也於第五位下立為內生者是攝前四位齊至法界而法界量滅同歸實際是一真法界大寂滅忍當生亦不生故喻如內生也以上四種建立同異之旨總不外始祖重離六爻一喻所謂疊三成五天然自成之妙是顯自性因果一周與華嚴六相義無二無別故余已悉於辯謬之中毫無可惑今復見以曹山君臣五位之圖前後移置者故再為詳明之如謂正中之君位可移置於初位第四臣位可移置於二位第一君視臣可移置於第三位第二臣奉君可移置於第四位將復謂雲巖正位之正中來洞山正位之功位石霜正位之末生王子皆可移在初位乎三種正位斷不可移則知三家先後各二位皆不可移明矣若明此四種建立必不可移即知雲巖重離六爻之喻詎容損益絲毫而吾於辯謬集中所詳三疊五變之義彰明較著復何疑哉即以先代君臣五位黑白間錯之圖式參對重離奇偶陰陽之爻象與正偏功勳王子三種建立之法式位位貼體參合無不相符如以日照日至此則知石門所撰巽兌中孚大過之卦義內紹外紹之王種義大慧所註宰相將軍庶民之子黑處說白白處說黑回互之義豈不大相剌謬也哉諸家隨聲逐響而宗其說大似謗佛謗祖慎之慎之
